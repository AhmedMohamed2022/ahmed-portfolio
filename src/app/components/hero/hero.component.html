<section id="hero" class="hero">
  <canvas #canvas class="hero-canvas"></canvas>

  <!-- Ambient blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="hero-content">
    <!-- Tag line -->
    <div class="hero-tag">
      <span class="tag-dot"></span>
      <span>Available for new opportunities</span>
    </div>

    <!-- Name -->
    <h1 class="hero-name">
      Ahmed Mohamed<br>
      <span class="hero-name-accent">Alsoghayar</span>
    </h1>

    <!-- Typewriter -->
    <div class="hero-title-wrap">
      <span class="hero-title">{{ typedText }}</span>
      <span class="cursor">|</span>
    </div>

    <!-- Description -->
    <p class="hero-desc">
      Building robust, scalable systems with
      <strong>.NET Core</strong> & <strong>Angular</strong> —
      from clean architectures to cloud-native solutions.
    </p>

    <!-- CTAs -->
    <div class="hero-ctas">
      <button class="btn-primary" (click)="scrollTo('#projects')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        View Projects
      </button>
      <a href="./CV/AhmedMohamedAlsoghayar-CV.pdf" download class="btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download CV
      </a>
      <button class="btn-outline" (click)="scrollTo('#contact')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
        Contact Me
      </button>
    </div>

    <!-- Quick stats -->
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-value">3+</span>
        <span class="stat-label">Years Experience</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">10+</span>
        <span class="stat-label">Projects Delivered</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">5+</span>
        <span class="stat-label">Tech Stacks</span>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator" (click)="scrollTo('#about')">
    <span>Scroll</span>
    <div class="scroll-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19" />
        <polyline points="19 12 12 19 5 12" />
      </svg>
    </div>
  </div>
</section>
