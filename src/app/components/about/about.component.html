<section id="about" class="about-section">
  <div class="section-container">
    <div class="about-grid">

      <!-- Left: Text -->
      <div class="about-text anim-el">
        <p class="section-tag">{{ 'about.tag' | translate }}</p>
        <h2 class="section-title" style="margin-bottom:1.5rem">
          {{ 'about.title1' | translate }}<br>
          <span class="accent-text">{{ 'about.title2' | translate }}</span>
        </h2>

        <p class="about-para" [innerHTML]="'about.p1' | translate"></p>
        <p class="about-para" [innerHTML]="'about.p2' | translate"></p>
        <p class="about-para" [innerHTML]="'about.p3' | translate"></p>

        <div class="about-actions">
          <a href="/assets/cv/ahmed-alsoghayar-cv.pdf" download class="btn-primary">
            {{ 'about.downloadCv' | translate }}
          </a>
          <a href="https://github.com/ahmed-alsoghayar" target="_blank" class="btn-outline">
            {{ 'about.githubProfile' | translate }}
          </a>
        </div>
      </div>

      <!-- Right: Highlights -->
      <div class="highlights-grid">
        <div *ngFor="let h of lang.t()['about']['highlights']; let i = index" class="highlight-card anim-el card-dark"
          [style.animation-delay]="(i * 0.1) + 's'">
          <div class="highlight-icon">{{ h.icon }}</div>
          <h3 class="highlight-label">{{ h.label }}</h3>
          <p class="highlight-desc">{{ h.desc }}</p>
        </div>
      </div>

    </div>
  </div>
</section>
